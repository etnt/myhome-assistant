# Phase 2: I2C Target + BLE Central (Scanning)

# I2C Target Mode
CONFIG_I2C=y
CONFIG_I2C_TARGET=y
CONFIG_I2C_TARGET_BUFFER_MODE=y

# GPIO (IRQ output + RST input)
CONFIG_GPIO=y

# BLE Central (scanning, future: connections)
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_DEVICE_NAME="XIAO-BLE-Bridge"

# BLE Security (needed for Phase 3+)
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Connection timeout (Hue bulbs advertise slowly, need >3s default)
CONFIG_BT_CREATE_CONN_TIMEOUT=10

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_BT_LOG_LEVEL_WRN=y

# Watchdog (reboot if no PING in 30s)
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# System
CONFIG_REBOOT=y
CONFIG_MAIN_STACK_SIZE=4096
