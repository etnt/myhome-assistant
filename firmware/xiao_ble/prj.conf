# Phase 1: I2C Target + PING/PONG
# BLE will be added in Phase 2+

# I2C Target Mode
CONFIG_I2C=y
CONFIG_I2C_TARGET=y
CONFIG_I2C_TARGET_BUFFER_MODE=y

# GPIO (IRQ output + RST input)
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Watchdog (reboot if no PING in 30s)
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# System
CONFIG_REBOOT=y
CONFIG_MAIN_STACK_SIZE=2048
