<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>MyHome Assistant</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --accent2: #f5a623;
  --text: #eaeaea;
  --text-dim: #8892a4;
  --success: #4ecdc4;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1rem;
}

h1 { font-size: 1.5rem; font-weight: 600; }
h2 { font-size: 1.1rem; font-weight: 500; color: var(--text-dim); margin-bottom: 0.75rem; }

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.header .logo {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.connection {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-left: auto;
}

.connection input {
  background: var(--bg);
  border: 1px solid #2a2a4a;
  color: var(--text);
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  font-size: 0.85rem;
  width: 180px;
}

.connection .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #555;
  transition: background 0.3s;
}

.connection .dot.connected { background: var(--success); }

/* Buttons */
.btn {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
.btn:active { transform: translateY(0); }

.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--card); color: var(--text); }
.btn-success { background: var(--success); color: #1a1a2e; }

/* Tab navigation */
.tabs {
  display: flex;
  gap: 0.25rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid #2a2a4a;
  flex-wrap: wrap;
}

.tab-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 0.6rem 1.1rem;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}

.tab-btn:hover { color: var(--text); }

.tab-btn.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Grid layout — two independent columns on desktop */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: start;
  gap: 1.5rem;
}

/* Each column packs its cards independently (so the right column's
   Policies card sits directly under Sensors, not below the taller
   left column's Lamps card). */
.col {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  min-width: 0;
}

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  border: 1px solid #2a2a4a;
  display: flex;
  flex-direction: column;
}

/* System panel */
.system-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

/* Log area */
.log-area {
  background: var(--bg);
  border-radius: 8px;
  padding: 0.75rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.75rem;
  min-height: 100px;
  flex: 1;
  overflow-y: auto;
  line-height: 1.6;
  color: var(--text-dim);
}

.log-area .log-line { white-space: pre-wrap; word-break: break-all; }
.log-area .log-info { color: var(--success); }
.log-area .log-warning { color: var(--accent2); }
.log-area .log-error { color: var(--accent); }

/* Bulb card */
.bulb-card {
  position: relative;
  overflow: hidden;
}

.all-lamps-card {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.all-lamps-label {
  font-weight: 600;
}

.all-lamps-actions {
  display: flex;
  gap: 0.5rem;
}

.bulb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.bulb-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 0.75rem;
}

.bulb-unpair {
  background: transparent;
  color: #e0b020;
  border: 1px solid #e0b020;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}

.bulb-unpair:hover {
  color: #1a1a2e;
  border-color: #f0c030;
  background: #f0c030;
}

.bulb-name {
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 1px dashed transparent;
}

.bulb-name:hover {
  border-bottom-color: var(--text-dim);
}

.bulb-name-input {
  font-size: 1.1rem;
  font-weight: 600;
  font-family: inherit;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 0.1rem 0.4rem;
  width: 10rem;
  max-width: 100%;
}

.bulb-status {
  font-size: 0.75rem;
  color: var(--text-dim);
  padding: 0.2rem 0.6rem;
  background: var(--bg);
  border-radius: 20px;
}

.bulb-status.on { color: var(--success); }

/* Toggle switch */
.toggle {
  position: relative;
  width: 52px;
  height: 28px;
  cursor: pointer;
}

.toggle input { display: none; }

.toggle .slider {
  position: absolute;
  inset: 0;
  background: #333;
  border-radius: 28px;
  transition: background 0.3s;
}

.toggle .slider::before {
  content: '';
  position: absolute;
  width: 22px;
  height: 22px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.3s;
}

.toggle input:checked + .slider { background: var(--success); }
.toggle input:checked + .slider::before { transform: translateX(24px); }

/* Sliders */
.control-group {
  margin-top: 1rem;
}

.control-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--accent2);
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.1s;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  background: var(--accent2);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.1s;
}

input[type="range"]::-moz-range-thumb:hover {
  transform: scale(1.2);
}

/* Color temp gradient track */
.color-temp-slider::-webkit-slider-runnable-track {
  background: linear-gradient(to right, #a8d8ff, #fff5e6, #ffcc66, #ff9933);
  height: 6px;
  border-radius: 3px;
}

.color-temp-slider::-moz-range-track {
  background: linear-gradient(to right, #a8d8ff, #fff5e6, #ffcc66, #ff9933);
  height: 6px;
  border-radius: 3px;
}

/* Scan results */
.scan-results {
  margin-top: 0.75rem;
}

.scan-item {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  border-bottom: 1px solid #2a2a4a;
  font-size: 0.8rem;
}

/* Sensor cards */
.sensor-card { }
.sensor-grid { display: flex; flex-direction: column; gap: 0.5rem; }
.sensor-row {
  display: grid;
  grid-template-columns: 1fr 7rem 9rem;
  gap: 0.75rem;
  align-items: center;
  padding: 0.3rem 0;
  font-size: 0.9rem;
}
.sensor-val { font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; }
.sensor-minmax { font-size: 0.75rem; color: var(--accent2); font-variant-numeric: tabular-nums; white-space: nowrap; text-align: right; }
.quality-badge {
  margin-top: 0.75rem;
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  text-align: center;
  width: fit-content;
}
.quality-badge.good { background: var(--success); color: #1a1a2e; }
.quality-badge.moderate { background: var(--accent2); color: #1a1a2e; }
.quality-badge.poor { background: var(--accent); color: white; }

.scan-item:last-child { border-bottom: none; }

/* Clickable sensor rows */
.sensor-row.clickable {
  cursor: pointer;
  border-radius: 6px;
  padding: 0.4rem 0.5rem;
  transition: background 0.15s;
}
.sensor-row.clickable:hover {
  background: var(--card);
}

/* Chart modal */
.chart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.chart-modal {
  background: var(--surface);
  border: 1px solid #2a2a4a;
  border-radius: var(--radius);
  padding: 1.5rem;
  width: min(90vw, 560px);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.chart-modal h3 {
  font-size: 1rem;
  font-weight: 600;
}

.chart-modal canvas {
  width: 100%;
  height: 220px;
  border-radius: 8px;
  background: var(--bg);
}

.chart-modal .chart-stats {
  display: flex;
  gap: 1.5rem;
  font-size: 0.8rem;
  color: var(--text-dim);
}

.chart-modal .chart-stats span { font-weight: 600; color: var(--text); }

.chart-close {
  align-self: flex-end;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
}
.chart-close:hover { color: var(--text); background: var(--card); }

/* Toast notifications */
.toast-container {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.toast {
  padding: 0.75rem 1.25rem;
  border-radius: 8px;
  font-size: 0.85rem;
  animation: slideIn 0.3s ease;
  max-width: 300px;
}

.toast-success { background: var(--success); color: #1a1a2e; }
.toast-error { background: var(--accent); color: white; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Responsive */
@media (max-width: 768px) {
  .header { flex-direction: column; align-items: flex-start; }
  .connection { margin-left: 0; width: 100%; }
  .grid { grid-template-columns: 1fr; }
}

/* Policy rows */
.policy-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 0.75rem;
  background: var(--bg);
  border-radius: 8px;
}

.policy-name {
  font-size: 0.9rem;
  font-weight: 500;
  flex: 1;
}

.policy-meta {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.policy-badge {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  text-transform: uppercase;
}

.policy-badge.active {
  background: var(--success);
  color: #1a1a2e;
  animation: pulse 1.5s infinite;
}

.policy-badge.idle {
  background: var(--card);
  color: var(--text-dim);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">MyHome Assistant</span>
  <div class="connection">
    <input type="text" id="hostInput" placeholder="IP:Port" value="192.168.68.52:8080">
    <div class="dot" id="connDot"></div>
    <button class="btn btn-secondary" onclick="checkStatus()">Connect</button>
  </div>
</div>

<nav class="tabs">
  <button class="tab-btn active" data-tab="dashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
  <button class="tab-btn" data-tab="system" onclick="showTab('system')">🖥 System</button>
  <button class="tab-btn" data-tab="admin" onclick="showTab('admin')">⚙ Admin</button>
</nav>

<!-- Dashboard: Lamps + Sensors -->
<section class="tab-panel active" id="tab-dashboard">
  <div class="grid">
    <div class="col">
      <div class="card all-lamps-card">
        <span class="all-lamps-label">💡 All Lamps</span>
        <div class="all-lamps-actions">
          <button class="btn btn-success" onclick="allPower(true)">All On</button>
          <button class="btn btn-secondary" onclick="allPower(false)">All Off</button>
        </div>
      </div>
      <div id="bulbContainer" class="col"></div>
    </div>
    <div class="col">
      <div id="mowerContainer" class="col"></div>
      <div id="sensorContainer" class="col"></div>
    </div>
  </div>
</section>

<!-- System: status / actions / logs -->
<section class="tab-panel" id="tab-system">
  <div class="card">
    <h2>🖥 System</h2>
    <div class="system-actions">
      <button class="btn btn-secondary" onclick="checkStatus()">Status</button>
      <button class="btn btn-secondary" onclick="doRefresh()">Refresh</button>
      <button class="btn btn-secondary" onclick="doScan()">Scan</button>
      <button class="btn btn-secondary" onclick="doDiscover()">Discover</button>
      <button class="btn btn-secondary" onclick="fetchLogs()">Logs</button>
    </div>
    <div class="log-area" id="logArea">
      <div class="log-line" style="color:var(--text-dim)">Ready. Enter controller IP:Port and click Connect.</div>
    </div>
  </div>
</section>

<!-- Admin: automation policies -->
<section class="tab-panel" id="tab-admin">
  <div class="card" id="policiesCard">
    <h2>⚡ Automation Policies</h2>
    <div id="policiesContainer" style="display:flex;flex-direction:column;gap:0.5rem;">
      <div style="color:var(--text-dim);font-size:0.85rem;">Loading...</div>
    </div>
  </div>
  <div class="card">
    <h2>🤖 Mower Bridge</h2>
    <div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:0.5rem;">
      URL of the host running <code>tools/navimow_server.py</code> (e.g. your home server).
    </div>
    <div style="display:flex;gap:0.5rem;">
      <input id="mowerUrlInput" type="text" placeholder="http://192.168.68.x:8765"
        style="flex:1;padding:0.5rem;background:var(--bg);color:var(--text);border:1px solid var(--accent);border-radius:var(--radius);">
      <button class="btn btn-secondary" onclick="saveMowerUrl()">Save</button>
    </div>
  </div>
</section>

<div class="toast-container" id="toasts"></div>

<script>
const $ = id => document.getElementById(id);

function baseUrl() {
  const host = $('hostInput').value.trim();
  return `http://${host}`;
}

// --- Toast notifications ---
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- API helper ---
async function api(method, path, body, timeout = 40000) {
  const url = `${baseUrl()}${path}`;
  const opts = { method, signal: AbortSignal.timeout(timeout) };
  if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  try {
    const res = await fetch(url, opts);
    const text = await res.text();
    try { return JSON.parse(text); } catch { return text; }
  } catch (e) {
    const msg = e.name === 'TimeoutError' ? 'Request timed out (BLE busy?)' : e.message;
    toast(`Request failed: ${msg}`, 'error');
    return null;
  }
}

// --- System commands ---
async function checkStatus() {
  clearLog();
  const data = await api('GET', '/api/status');
  if (data) {
    $('connDot').classList.add('connected');
    if (data.bulbs && data.bulbs.length) {
      data.bulbs.forEach(b => {
        const pwr = b.power ? 'ON' : 'OFF';
        const label = b.display_name || b.name;
        appendLog('info', `${label}: ${pwr}  bri=${b.brightness}  ct=${b.color_temp}`);
      });
    } else {
      appendLog('info', 'No bulbs registered');
    }
    // Refresh bulb states
    refreshBulbs();
    // Fetch initial sensor + policy data, then start event loop
    refreshSensors();
    refreshPolicies();
    refreshMower();
    startEventLoop();
  } else {
    $('connDot').classList.remove('connected');
    stopEventLoop();
  }
}

async function doScan() {
  clearLog();
  appendLog('info', 'Scanning...');
  const data = await api('POST', '/api/scan', { duration: 10 });
  if (data) {
    appendLog('info', `Scan complete`);
    const results = await api('GET', '/api/scan');
    if (results && results.scan && results.scan.results) {
      const named = results.scan.results.filter(r => r.name);
      named.forEach(r => appendLog('info', `  ${r.addr} rssi=${r.rssi} ${r.name}`));
    }
  }
}

async function doDiscover() {
  clearLog();
  appendLog('info', 'Discovering Hue bulbs...');
  const data = await api('POST', '/api/discover');
  if (data) {
    appendLog('info', `Discover: ${JSON.stringify(data)}`);
    toast('Discovery started');
    setTimeout(refreshBulbs, 5000);
  }
}

async function fetchLogs() {
  clearLog();
  const data = await api('GET', '/api/logs?limit=30');
  if (data && data.logs) {
    data.logs.reverse().forEach(l => appendLog(l.level, `[${l.ts}] ${l.msg}`));
  }
}

// --- Bulb management ---
const bulbs = {};
const NUM_BULBS = 4; // Check up to 4 bulbs

async function refreshBulbs() {
  const data = await api('GET', '/api/status');
  if (data && data.bulbs) {
    data.bulbs.forEach(b => {
      const id = bulbIdFromName(b.name);
      if (id == null) return;
      bulbs[id] = { ...bulbs[id], ...b };
      renderBulb(id, bulbs[id]);
    });
  }
}

// Extract numeric id from a bulb name like "bulb_2" -> 2
function bulbIdFromName(name) {
  const m = /^bulb_(\d+)$/.exec(String(name || ''));
  return m ? parseInt(m[1], 10) : null;
}

async function doRefresh() {
  clearLog();
  appendLog('info', 'Reading live state from bulbs (BLE)...');
  for (let i = 1; i <= NUM_BULBS; i++) {
    const data = await api('POST', `/api/bulb/${i}/refresh`);
    if (data && data.status === 'ok') {
      bulbs[i] = { ...bulbs[i], ...data };
      renderBulb(i, bulbs[i]);
      appendLog('info', `Bulb ${i}: power=${data.power} bri=${data.brightness} ct=${data.color_temp}`);
    } else if (data && data.status === 'error') {
      if (data.reason === 'process not running') break; // no more bulbs
    }
  }
  appendLog('info', 'Refresh complete');
}

function renderBulb(id, state) {
  let card = document.getElementById(`bulb-${id}`);
  if (!card) {
    card = document.createElement('div');
    card.id = `bulb-${id}`;
    card.className = 'card bulb-card';
    $('bulbContainer').appendChild(card);
  }

  const isOn = state.power === true;
  const bri = state.brightness != null ? state.brightness : 128;
  const ct = state.color_temp != null ? state.color_temp : 370;
  const label = state.display_name || `Bulb ${id}`;

  card.innerHTML = `
    <div class="bulb-header">
      <span class="bulb-name" id="bulb-name-${id}" title="Click to rename"
        onclick="startRename(${id})">${escapeHtml(label)}</span>
      <span class="bulb-status ${isOn ? 'on' : ''}">${isOn ? 'ON' : 'OFF'}</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <label class="toggle">
        <input type="checkbox" ${isOn ? 'checked' : ''} onchange="togglePower(${id}, this.checked)">
        <span class="slider"></span>
      </label>
      <span style="font-size:0.8rem;color:var(--text-dim)">Power</span>
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>Brightness</span>
        <span id="bri-val-${id}">${bri}</span>
      </div>
      <input type="range" min="1" max="254" value="${bri}"
        oninput="$('bri-val-${id}').textContent=this.value"
        onchange="setBrightness(${id}, +this.value)">
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>Color Temp</span>
        <span id="ct-val-${id}">${ct} mirek</span>
      </div>
      <input type="range" class="color-temp-slider" min="153" max="500" value="${ct}"
        oninput="$('ct-val-${id}').textContent=this.value+' mirek'"
        onchange="setColorTemp(${id}, +this.value)">
    </div>
    <div class="bulb-footer">
      <button class="bulb-unpair" title="Delete the BLE bond on the nRF. Use after factory-resetting the bulb to fix pairing problems."
        onclick="unpairBulb(${id}, '${escapeHtml(label)}')">Unpair</button>
    </div>
  `;
}

// --- Bulb commands ---
let bulbBusy = false;

function setBulbsDisabled(busy) {
  bulbBusy = busy;
  document.querySelectorAll('.bulb-card').forEach(card => {
    card.style.opacity = busy ? '0.5' : '';
    card.style.pointerEvents = busy ? 'none' : '';
  });
}

async function togglePower(id, on) {
  if (bulbBusy) return;
  setBulbsDisabled(true);
  const data = await api('POST', `/api/bulb/${id}/power`, { on });
  setBulbsDisabled(false);
  if (data && data.status === 'ok') {
    toast(`Bulb ${id} ${on ? 'on' : 'off'}`);
    bulbs[id] = { ...bulbs[id], power: on };
    renderBulb(id, bulbs[id]);
  } else {
    toast(`Power failed: ${JSON.stringify(data)}`, 'error');
    // Revert toggle
    setTimeout(() => refreshBulbs(), 500);
  }
}

async function allPower(on) {
  if (bulbBusy) return;
  setBulbsDisabled(true);
  let ok = 0, failed = 0;
  for (let i = 1; i <= NUM_BULBS; i++) {
    const data = await api('POST', `/api/bulb/${i}/power`, { on });
    if (data && data.status === 'ok') {
      ok++;
      bulbs[i] = { ...bulbs[i], power: on };
      renderBulb(i, bulbs[i]);
    } else if (data && data.status === 'error' && data.reason === 'process not running') {
      break; // no more bulbs
    } else {
      failed++;
    }
  }
  setBulbsDisabled(false);
  if (failed > 0) {
    toast(`All ${on ? 'on' : 'off'}: ${ok} ok, ${failed} failed`, 'error');
  } else {
    toast(`All lamps ${on ? 'on' : 'off'} (${ok})`);
  }
}

async function unpairBulb(id, label) {
  if (bulbBusy) return;
  const ok = confirm(
    `Unpair "${label}"?\n\n` +
    `This deletes the BLE bond (stored key) for this bulb on the nRF.\n` +
    `Use this to fix pairing problems. After unpairing, factory-reset ` +
    `the bulb, then use Discover (or send a command) to pair again.`
  );
  if (!ok) return;
  setBulbsDisabled(true);
  const data = await api('DELETE', `/api/bulb/${id}/bond`);
  setBulbsDisabled(false);
  if (data && data.status === 'ok') {
    toast(`Bond deleted for "${label}"`);
  } else {
    toast(`Unpair failed: ${data ? data.reason || '' : 'no response'}`, 'error');
  }
}

async function setBrightness(id, value) {
  if (bulbBusy) return;
  setBulbsDisabled(true);
  value = parseInt(value, 10);
  const data = await api('POST', `/api/bulb/${id}/brightness`, { value });
  setBulbsDisabled(false);
  if (data && data.status === 'ok') {
    bulbs[id] = { ...bulbs[id], brightness: value };
  } else {
    toast(`Brightness failed: ${data ? data.reason || '' : 'no response'}`, 'error');
  }
}

async function setColorTemp(id, value) {
  if (bulbBusy) return;
  setBulbsDisabled(true);
  value = parseInt(value, 10);
  const data = await api('POST', `/api/bulb/${id}/color_temp`, { value });
  setBulbsDisabled(false);
  if (data && data.status === 'ok') {
    bulbs[id] = { ...bulbs[id], color_temp: value };
  } else {
    toast(`Color temp failed: ${data ? data.reason || '' : 'no response'}`, 'error');
  }
}

// --- Bulb rename ---
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function startRename(id) {
  const span = document.getElementById(`bulb-name-${id}`);
  if (!span || span.querySelector('input')) return;
  const current = bulbs[id] && bulbs[id].display_name ? bulbs[id].display_name : `Bulb ${id}`;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.className = 'bulb-name-input';
  input.onclick = e => e.stopPropagation();
  input.onkeydown = e => {
    if (e.key === 'Enter') input.blur();
    else if (e.key === 'Escape') { input.dataset.cancel = '1'; input.blur(); }
  };
  input.onblur = () => {
    if (input.dataset.cancel) { renderBulb(id, bulbs[id] || {}); return; }
    const name = input.value.trim();
    if (name && name !== current) renameBulb(id, name);
    else renderBulb(id, bulbs[id] || {});
  };
  span.textContent = '';
  span.appendChild(input);
  input.focus();
  input.select();
}

async function renameBulb(id, name) {
  const data = await api('POST', `/api/bulb/${id}/name`, { name });
  if (data && data.status === 'ok') {
    bulbs[id] = { ...bulbs[id], display_name: name };
    renderBulb(id, bulbs[id]);
    toast(`Renamed bulb ${id} to "${name}"`);
  } else {
    toast(`Rename failed: ${data ? data.reason || '' : 'no response'}`, 'error');
    renderBulb(id, bulbs[id] || {});
  }
}

// --- Log area ---
function clearLog() {
  $('logArea').innerHTML = '';
}

function appendLog(level, msg) {
  const area = $('logArea');
  const line = document.createElement('div');
  line.className = `log-line log-${level}`;
  line.textContent = msg;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

// --- Sensors ---
const sensorMinMax = {};
const sensorHistory = {};  // key -> [{ts, value}]
const HISTORY_MAX = 360;   // 30 min at 5s intervals

function trackMinMax(key, value) {
  const v = parseFloat(value);
  if (!sensorMinMax[key]) sensorMinMax[key] = { min: v, max: v };
  if (v < sensorMinMax[key].min) sensorMinMax[key].min = v;
  if (v > sensorMinMax[key].max) sensorMinMax[key].max = v;
  // Record history
  if (!sensorHistory[key]) sensorHistory[key] = [];
  sensorHistory[key].push({ ts: Date.now(), value: v });
  if (sensorHistory[key].length > HISTORY_MAX) sensorHistory[key].shift();
  return sensorMinMax[key];
}

function sensorRow(label, value, unit, key) {
  const mm = trackMinMax(key, value);
  return `<div class="sensor-row clickable" onclick="showChart('${key}', '${label}', '${unit}')">
    <span>${label}</span>
    <span class="sensor-val">${value} ${unit}</span>
    <span class="sensor-minmax">↓${mm.min} ↑${mm.max}</span>
  </div>`;
}

// --- Chart popup ---
function showChart(key, label, unit) {
  const hist = sensorHistory[key];
  if (!hist || hist.length < 2) { toast('Not enough data yet — wait a few readings', 'error'); return; }

  // Create overlay
  const overlay = document.createElement('div');
  overlay.className = 'chart-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  const mm = sensorMinMax[key] || { min: 0, max: 1 };
  const latest = hist[hist.length - 1].value;
  const elapsed = ((hist[hist.length - 1].ts - hist[0].ts) / 60000).toFixed(1);

  overlay.innerHTML = `
    <div class="chart-modal">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>${label} (${unit})</h3>
        <button class="chart-close" onclick="this.closest('.chart-overlay').remove()">&times;</button>
      </div>
      <canvas id="chartCanvas" width="520" height="220"></canvas>
      <div class="chart-stats">
        <div>Current: <span>${latest.toFixed(2)} ${unit}</span></div>
        <div>Min: <span>${mm.min.toFixed(2)}</span></div>
        <div>Max: <span>${mm.max.toFixed(2)}</span></div>
        <div>Span: <span>${elapsed} min</span></div>
        <div>Points: <span>${hist.length}</span></div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  drawChart(document.getElementById('chartCanvas'), hist, unit);
}

function drawChart(canvas, data, unit) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = { top: 20, right: 12, bottom: 28, left: 50 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  const values = data.map(d => d.value);
  let vMin = Math.min(...values);
  let vMax = Math.max(...values);
  if (vMax === vMin) { vMin -= 1; vMax += 1; }
  const margin = (vMax - vMin) * 0.1;
  vMin -= margin; vMax += margin;

  const tMin = data[0].ts;
  const tMax = data[data.length - 1].ts;

  function xOf(ts) { return pad.left + ((ts - tMin) / (tMax - tMin)) * cw; }
  function yOf(v) { return pad.top + ch - ((v - vMin) / (vMax - vMin)) * ch; }

  // Grid lines
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1;
  const gridLines = 5;
  for (let i = 0; i <= gridLines; i++) {
    const y = pad.top + (ch / gridLines) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const lbl = (vMax - ((vMax - vMin) / gridLines) * i).toFixed(1);
    ctx.fillStyle = '#8892a4';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(lbl, pad.left - 6, y + 3);
  }

  // Time labels
  ctx.textAlign = 'center';
  const ticks = Math.min(5, data.length);
  for (let i = 0; i < ticks; i++) {
    const idx = Math.floor((data.length - 1) * i / (ticks - 1));
    const t = new Date(data[idx].ts);
    const lbl = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    ctx.fillText(lbl, xOf(data[idx].ts), H - 6);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#4ecdc4';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  data.forEach((d, i) => {
    const x = xOf(d.ts), y = yOf(d.value);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill area under line
  ctx.lineTo(xOf(data[data.length - 1].ts), pad.top + ch);
  ctx.lineTo(xOf(data[0].ts), pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = 'rgba(78, 205, 196, 0.1)';
  ctx.fill();
}

async function refreshSensors() {
  const data = await api('GET', '/api/sensors');
  if (data && data.status === 'ok' && data.sensors) {
    renderSensors(data.sensors);
  }
}

function renderSensors(sensors) {
  const container = $('sensorContainer');
  container.innerHTML = '';

  if (sensors.bme680) {
    const s = sensors.bme680;
    const temp = s.temperature_c.toFixed(1);
    const hum = s.humidity_pct.toFixed(1);
    const pres = s.pressure_hpa.toFixed(1);
    const gas = (s.gas_ohms / 1000).toFixed(1);
    container.innerHTML += `
      <div class="card sensor-card">
        <h2>🌡 Environment (BME680)</h2>
        <div class="sensor-grid">
          ${sensorRow('Temperature', temp, '°C', 'bme680_temp')}
          ${sensorRow('Humidity', hum, '%', 'bme680_hum')}
          ${sensorRow('Pressure', pres, 'hPa', 'bme680_pres')}
          ${sensorRow('Gas (VOC)', gas, 'kΩ', 'bme680_gas')}
        </div>
      </div>`;
  }

  if (sensors.sgp30) {
    const s = sensors.sgp30;
    let quality = 'Good', qclass = 'good';
    if (s.eco2_ppm > 1000) { quality = 'Poor'; qclass = 'poor'; }
    else if (s.eco2_ppm > 600) { quality = 'Moderate'; qclass = 'moderate'; }
    container.innerHTML += `
      <div class="card sensor-card">
        <h2>🌬 Air Quality (SGP30)</h2>
        <div class="sensor-grid">
          ${sensorRow('eCO₂', s.eco2_ppm, 'ppm', 'sgp30_eco2')}
          ${sensorRow('TVOC', s.tvoc_ppb, 'ppb', 'sgp30_tvoc')}
        </div>
        <div class="quality-badge ${qclass}">${quality}</div>
      </div>`;
  }

  if (sensors.veml6030) {
    const s = sensors.veml6030;
    const lux = s.lux.toFixed(1);
    const wlux = s.white_lux.toFixed(1);
    container.innerHTML += `
      <div class="card sensor-card">
        <h2>☀ Light (VEML6030)</h2>
        <div class="sensor-grid">
          ${sensorRow('Ambient', lux, 'lux', 'veml_lux')}
          ${sensorRow('White', wlux, 'lux', 'veml_white')}
        </div>
      </div>`;
  }
}

// --- Mower (Navimow) ---
// The mower lives in the vendor cloud, not on the ESP32, so the UI talks to
// a small host-side bridge (tools/navimow_server.py) instead of baseUrl().
const MOWER_DEFAULT = 'http://localhost:8765';
function mowerUrl() {
  return (localStorage.getItem('myhome_mower_url') || MOWER_DEFAULT).replace(/\/+$/, '');
}

function saveMowerUrl() {
  const url = $('mowerUrlInput').value.trim();
  if (url) {
    localStorage.setItem('myhome_mower_url', url);
  } else {
    localStorage.removeItem('myhome_mower_url');
  }
  toast('Mower bridge URL saved');
  refreshMower();
}

const MOWER_STATES = {
  mowing:    { icon: '🌱', label: 'Mowing',    color: 'var(--success)' },
  charging:  { icon: '🔌', label: 'Charging',  color: 'var(--accent2)' },
  docked:    { icon: '🏠', label: 'Docked',    color: 'var(--text-dim)' },
  returning: { icon: '↩️', label: 'Returning', color: 'var(--accent2)' },
  paused:    { icon: '⏸️', label: 'Paused',    color: 'var(--accent2)' },
  idle:      { icon: '💤', label: 'Idle',      color: 'var(--text-dim)' },
  error:     { icon: '⚠️', label: 'Error',     color: 'var(--accent)' },
  unknown:   { icon: '❓', label: 'Unknown',   color: 'var(--text-dim)' },
};

async function refreshMower() {
  try {
    const res = await fetch(`${mowerUrl()}/api/mower`, { signal: AbortSignal.timeout(15000) });
    const data = await res.json();
    if (!data.ok) { renderMowerMessage(data.error || 'Mower unavailable'); return; }
    renderMower(data.mowers || []);
  } catch (e) {
    renderMowerMessage('Bridge offline — run <code>python tools/navimow_server.py</code>');
  }
}

function batteryColor(pct) {
  if (pct == null) return 'var(--text-dim)';
  if (pct <= 20) return 'var(--accent)';
  if (pct <= 50) return 'var(--accent2)';
  return 'var(--success)';
}

function renderMower(mowers) {
  const container = $('mowerContainer');
  if (!mowers.length) { renderMowerMessage('No mower on this account'); return; }
  container.innerHTML = mowers.map(m => {
    const s = MOWER_STATES[m.state] || MOWER_STATES.unknown;
    const bat = m.battery;
    const batLabel = bat == null ? '—' : `${bat}%`;
    const batWidth = bat == null ? 0 : Math.max(0, Math.min(100, bat));
    const err = (m.state === 'error' && m.error_message)
      ? `<div style="color:var(--accent);font-size:0.85rem;margin-top:0.5rem;">⚠️ ${m.error_message}</div>`
      : '';
    return `
      <div class="card sensor-card">
        <h2>🤖 ${m.name || 'Mower'}${m.model ? ` <span style="color:var(--text-dim);font-weight:400;">(${m.model})</span>` : ''}</h2>
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
          <span style="font-size:1.4rem;">${s.icon}</span>
          <span style="font-weight:600;color:${s.color};">${s.label}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:var(--text-dim);margin-bottom:0.25rem;">
          <span>Battery</span><span style="color:var(--text);">${batLabel}</span>
        </div>
        <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${batWidth}%;background:${batteryColor(bat)};transition:width 0.4s;"></div>
        </div>
        ${err}
      </div>`;
  }).join('');
}

function renderMowerMessage(html) {
  $('mowerContainer').innerHTML = `
    <div class="card sensor-card">
      <h2>🤖 Mower</h2>
      <div style="color:var(--text-dim);font-size:0.85rem;">${html}</div>
    </div>`;
}

// --- Policies ---
async function refreshPolicies() {
  const data = await api('GET', '/api/policies');
  if (data && data.status === 'ok' && data.policies) {
    renderPolicies(data.policies);
  }
}

function renderPolicies(policies) {
  const container = $('policiesContainer');
  container.innerHTML = policies.map(p => {
    const activeLabel = p.active
      ? `<span class="policy-badge active">active</span>`
      : `<span class="policy-badge idle">idle</span>`;
    const agoText = p.last_fired_ago_s != null
      ? `fired ${formatAgo(p.last_fired_ago_s)} ago`
      : 'never fired';
    return `
      <div class="policy-row">
        <label class="toggle" style="transform:scale(0.75);">
          <input type="checkbox" ${p.enabled ? 'checked' : ''}
            onchange="togglePolicy('${p.id}', this.checked)">
          <span class="slider"></span>
        </label>
        <span class="policy-name">${p.id.replace(/_/g, ' ')}</span>
        ${activeLabel}
        <span class="policy-meta">${p.rule_count} rule${p.rule_count > 1 ? 's' : ''} · ${agoText}</span>
      </div>`;
  }).join('');
}

function formatAgo(seconds) {
  if (seconds < 60) return `${seconds}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
  return `${Math.floor(seconds / 3600)}h`;
}

async function togglePolicy(id, enabled) {
  const action = enabled ? 'enable' : 'disable';
  const data = await api('POST', `/api/policies/${id}/${action}`);
  if (data && data.status === 'ok') {
    toast(`${id.replace(/_/g, ' ')} ${action}d`);
    refreshPolicies();
  } else {
    toast(`Failed to ${action} policy`, 'error');
    refreshPolicies();
  }
}

// --- Init ---
// Restore last-used host (the controller's DHCP IP changes between sessions).
const savedHost = localStorage.getItem('myhome_host');
if (savedHost) $('hostInput').value = savedHost;

$('hostInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkStatus();
});
$('hostInput').addEventListener('change', () => {
  localStorage.setItem('myhome_host', $('hostInput').value.trim());
});

// --- Tab navigation ---
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = $(`tab-${name}`);
  if (panel) panel.classList.add('active');
  const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if (btn) btn.classList.add('active');
}

// Auto-connect on load
setTimeout(checkStatus, 500);

// Mower status comes from a separate host-side bridge, independent of the
// ESP32 connection, so poll it on its own cadence.
$('mowerUrlInput').value = localStorage.getItem('myhome_mower_url') || '';
refreshMower();
setInterval(refreshMower, 60000);

// --- Long-poll event loop ---
// Replaces constant polling. The ESP32 holds the connection open until
// an event occurs (sensor update, policy change, bulb state change) or
// 30s timeout. UI reconnects immediately after each response.
let eventLoopActive = false;

async function startEventLoop() {
  if (eventLoopActive) return;
  eventLoopActive = true;
  while (eventLoopActive) {
    try {
      const resp = await fetch(`http://${$('hostInput').value}/api/events`);
      if (!resp.ok) { await sleep(5000); continue; }
      const data = await resp.json();
      if (data.event) {
        handleEvent(data.event);
      }
    } catch (e) {
      // Connection lost — retry after delay
      await sleep(5000);
    }
  }
}

function stopEventLoop() {
  eventLoopActive = false;
}

function handleEvent(event) {
  switch (event.type) {
    case 'sensor_update':
      updateSensorsUI(event.data);
      break;
    case 'policy_changed':
      refreshPolicies(); // re-fetch full policy list for consistency
      break;
    case 'bulb_state':
      const d = event.data;
      const match = d.name && d.name.match(/bulb_(\d+)/);
      if (match) {
        const id = parseInt(match[1]);
        bulbs[id] = { ...bulbs[id], ...d, status: 'ok' };
        renderBulb(id, bulbs[id]);
      }
      break;
  }
}

function updateSensorsUI(sensors) {
  // Reuse existing rendering logic by calling refreshSensors with cached data
  if (sensors) {
    cachedSensors = sensors;
    renderSensors(sensors);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
